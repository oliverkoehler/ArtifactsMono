services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  python-app:
    labels:
      - "service=python-app"
      - "app=artifactsmmo"
    build:
      context: .
      dockerfile: Dockerfile
      target: python-app
    container_name: python-app
    environment:
      - METRICS_PORT=8000
    expose:
      - "8000"
    restart: unless-stopped

