  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    ports:
      - "9443:9443"
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  promtail-data:
  portainer_data:

networks:
  default:
    name: portainer_network
